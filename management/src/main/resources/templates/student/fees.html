<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>My Fees</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="card shadow p-5">

		<div class="card-header bg-primary text-white">

					<div class="d-flex justify-content-between">

					<h2>Fee Details</h2>

					<a href="/student/dashboard"
					   class="btn btn-secondary">

					Back

					</a>

					</div>

		        </div>


        <table class="table">

            <tr>
                <th>Total Fee</th>
<!--                <td th:text="${fee.totalFee}"></td>-->
				<td th:if="${fee != null}" th:text="${fee.totalFee}"></td>
            </tr>

            <tr>
                <th>Paid</th>
                <td th:text="${fee.paidAmount}"></td>
            </tr>

            <tr>
                <th>Due</th>
                <td th:text="${fee.dueAmount}"></td>
            </tr>

            <tr>
                <th>Status</th>
                <td th:text="${fee.status}"></td>
            </tr>

            <tr>
                <th>Receipt No</th>
                <td th:text="${fee.receiptNo}"></td>
            </tr>

        </table>

    </div>
	<td>

	<a
	th:href="@{/admin/receipt/{id}(id=${fee.id})}"
	class="btn btn-primary">

	Download Receipt

	</a>

	</td>
</div>

</body>
</html>
