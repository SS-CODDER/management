<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Student Profile</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3>Student Profile</h3>

</div>

<div class="card-body">

<div th:if="${success}"
     class="alert alert-success">

<span th:text="${success}">
</span>

</div>

<form
th:action="@{/student/update-profile}"
method="post">

<div class="row">

<div class="col-md-6">

<label>Admission No</label>

<input
class="form-control"
th:value="${student.admissionNo}"
readonly>

</div>

<div class="col-md-6">

<label>Name</label>

<input
class="form-control"
th:value="${student.firstName + ' ' + student.lastName}"
readonly>

</div>

</div>

<br>

<div class="row">

<div class="col-md-6">

<label>Email</label>

<input
type="email"
name="email"
th:value="${student.email}"
class="form-control">

</div>

<div class="col-md-6">

<label>Phone</label>

<input
type="text"
name="phone"
th:value="${student.phone}"
class="form-control">

</div>

</div>

<br>

<label>Address</label>

<textarea
name="address"
class="form-control"
th:text="${student.address}">
</textarea>

<br>

<button
class="btn btn-success">

Update Profile

</button>

</form>

</div>

</div>

</div>

</body>

</html>
