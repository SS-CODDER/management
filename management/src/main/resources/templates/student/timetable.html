<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<title>Student Timetable</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet">

<style>

body{
    background:#f5f7fb;
}

.card{
    border:none;
    border-radius:15px;
}

</style>

</head>
<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

			<div class="d-flex justify-content-between">

			<h3>Student Timetable</h3>

			<a href="/student/dashboard"
			   class="btn btn-secondary">

			Back

			</a>

			</div>

        </div>

        <div class="card-body">

            <div th:if="${#lists.isEmpty(timetables)}">

                <div class="alert alert-warning">

                    No Timetable Available

                </div>

            </div>

            <table class="table table-bordered table-striped"
                   th:if="${!#lists.isEmpty(timetables)}">

                <thead class="table-dark">

                <tr>
                    <th>Day</th>
                    <th>Subject</th>
                    <th>Teacher</th>
                    <th>Time</th>
                    <th>Room</th>
                </tr>

                </thead>

                <tbody>

                <tr th:each="t : ${timetables}">

                    <td th:text="${t.dayName}"></td>

                    <td th:text="${t.subject}"></td>

                    <td th:text="${t.teacherName}"></td>

					<td
					th:text="${t.startTime + ' to ' + t.endTime}">
					</td>


                    <td th:text="${t.roomNo}"></td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
