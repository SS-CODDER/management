<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Student Results</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

.result-card{
    border:none;
    border-radius:15px;
}

.summary-card{
    border-radius:12px;
}

</style>

</head>

<body>

<div class="container mt-5">

    <div class="card shadow result-card">

		<div class="card-header bg-primary text-white">

							<div class="d-flex justify-content-between">

							 <h3 class="mb-0">Student Result</h3>

							<a href="/student/dashboard"
							   class="btn btn-secondary">

							Back

							</a>

							</div>

				        </div>

        <div class="card-body">

            <div th:if="${#lists.isEmpty(results)}"
                 class="alert alert-warning">

                No Result Found

            </div>

            <div th:if="${!#lists.isEmpty(results)}">

				<table class="table table-bordered">

					<thead>

					<tr>

					<th>Exam</th>

					<th>Subject</th>

					<th>Total</th>

					<th>Obtained</th>

					<th>%</th>

					<th>Grade</th>

					<th>Status</th>

					</tr>

					</thead>

				    <tbody>

						<tr th:each="result : ${results}">

						<td th:text="${result.examName}">
						</td>

						<td th:text="${result.subject.subjectName}">
						</td>

						<td th:text="${result.totalMarks}">
						</td>

						<td th:text="${result.obtainedMarks}">
						</td>

						<td th:text="${result.percentage}">
						</td>

						<td th:text="${result.grade}">
						</td>

						<td th:text="${result.status}">
						</td>

						</tr>
				    </tbody>

				</table>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
