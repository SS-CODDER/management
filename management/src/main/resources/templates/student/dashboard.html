<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Student Dashboard</title>

    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">

</head>

<body>

<div class="sidebar">

    <div class="logo">
        🎓 Student Panel
    </div>

    <ul>

        <li><a href="/student/dashboard">Dashboard</a></li>
        <li><a href="/student/profile">Profile</a></li>
        <li><a href="/student/attendance">Attendance</a></li>
        <li><a href="/student/result">Results</a></li>
        <li><a href="/student/fees">Fees</a></li>
        <li><a href="/student/timetable">Timetable</a></li>
        <li><a href="/student/exams">Exams</a></li>
        <li><a href="/student/homeworks">Homework</a></li>

    </ul>

</div>

<div class="main-content">

    <div class="topbar">

        <h2>Student Dashboard</h2>

        <div>

            <button class="btn btn-success">

                <span th:text="${studentName}"></span>

            </button>

            <a href="/"
               class="btn btn-danger">

                Logout

            </a>

        </div>

    </div>

    <!-- Profile Card -->

    <div class="card shadow mb-4">

        <div class="card-body">

            <div class="row align-items-center">

                <div class="col-md-3 text-center">

                    <img src="/images/default-user.png"
                         class="rounded-circle img-fluid"
                         style="width:140px;height:140px;object-fit:cover;">

                </div>

                <div class="col-md-9">

                    <h3>

                        <span th:text="${student.firstName}"></span>
                        <span th:text="${student.lastName}"></span>

                    </h3>

                    <hr>

                    <div class="row">

                        <div class="col-md-4">

                            <strong>Admission No</strong>

                            <p th:text="${student.admissionNo}"></p>

                        </div>

                        <div class="col-md-4">

                            <strong>Class</strong>

                            <p>

                                <span th:text="${student.className}"></span>

                                -

                                <span th:text="${student.section}"></span>

                            </p>

                        </div>

                        <div class="col-md-4">

                            <strong>Phone</strong>

                            <p th:text="${student.phone}"></p>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- Notice -->

    <div class="card shadow mb-4">

        <div class="card-body">

			<h5>📢 Latest Notices</h5>

			<div
			th:each="n : ${notices}"
			class="border-bottom py-2">

			    <strong
			    th:text="${n.title}">
			    </strong>

			    <p class="mb-0 text-muted"
			       th:text="${n.description}">
			    </p>

			</div>

        </div>

    </div>

    <!-- Statistics -->

    <div class="row g-4">

        <div class="col-md-3">

            <div class="card bg-primary text-white shadow">

                <div class="card-body text-center">

                    <h2 th:text="${attendancePercentage}">0</h2>

                    <p>Attendance %</p>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card bg-danger text-white shadow">

                <div class="card-body text-center">

                    <h2 th:text="${dueFee}">0</h2>

                    <p>Pending Fees</p>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card bg-warning shadow">

                <div class="card-body text-center">

                    <h2 th:text="${upcomingExams}">0</h2>

                    <p>Upcoming Exams</p>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card bg-success text-white shadow">

                <div class="card-body text-center">

                    <h2 th:text="${homeworkCount}">0</h2>

                    <p>Homework</p>

                </div>

            </div>

        </div>

    </div>

    <!-- Quick Access -->

    <div class="row mt-4 g-4">

        <div class="col-md-3">

            <a href="/student/attendance"
               class="btn btn-primary w-100 p-3">

                Attendance

            </a>

        </div>

        <div class="col-md-3">

            <a href="/student/result"
               class="btn btn-success w-100 p-3">

                Results

            </a>

        </div>

        <div class="col-md-3">

            <a href="/student/fees"
               class="btn btn-warning w-100 p-3">

                Fees

            </a>

        </div>

        <div class="col-md-3">

            <a href="/student/timetable"
               class="btn btn-info w-100 p-3">

                Timetable

            </a>

        </div>

    </div>

</div>

</body>
</html>
