<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Enter Result</title>

```
<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
<link rel="stylesheet" th:href="@{/css/layout.css}">
```

</head>

<body>

<div th:replace="fragments/sidebar-teacher :: sidebar"></div>

<div class="main-content">

```
<div th:replace="fragments/header :: header('Result Entry')"></div>

<div class="container-fluid">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <div class="d-flex justify-content-between">

                <h4>Enter Student Result</h4>

                <a th:href="@{/teacher/dashboard}"
                   class="btn btn-light">

                    Back

                </a>

            </div>

        </div>

        <div class="card-body">

            <form th:action="@{/teacher/save-result}"
                  method="post">

                <div class="row">

                    <div class="col-md-6">

                        <label class="form-label">Student</label>

                        <select name="studentId"
                                class="form-select">

                            <option th:each="student : ${students}"
                                    th:value="${student.id}"
                                    th:text="${student.firstName + ' ' + student.lastName}">
                            </option>

                        </select>

                    </div>

                    <div class="col-md-6">

                        <label class="form-label">Subject</label>

                        <select name="subjectName"
                                class="form-select">

                            <option th:each="subject : ${subjects}"
                                    th:value="${subject.subjectName}"
                                    th:text="${subject.subjectName}">
                            </option>

                        </select>

                    </div>

                </div>

                <br>

                <div class="row">

                    <div class="col-md-6">

                        <label class="form-label">Exam</label>

                        <select name="examName"
                                class="form-select">

                            <option>Monthly Test</option>
                            <option>Mid Term</option>
                            <option>Final Term</option>

                        </select>

                    </div>

                    <div class="col-md-3">

                        <label class="form-label">Total Marks</label>

                        <input type="number"
                               name="totalMarks"
                               value="100"
                               class="form-control">

                    </div>

                    <div class="col-md-3">

                        <label class="form-label">Obtained Marks</label>

                        <input type="number"
                               name="obtainedMarks"
                               class="form-control"
                               required>

                    </div>

                </div>

                <br>

                <label class="form-label">Remarks</label>

                <textarea name="remarks"
                          class="form-control"
                          rows="3"></textarea>

                <br>

                <button class="btn btn-success">

                    Save Result

                </button>

            </form>

        </div>

    </div>

</div>
```

</div>

<div th:replace="fragments/footer :: footer"></div>

</body>

</html>
