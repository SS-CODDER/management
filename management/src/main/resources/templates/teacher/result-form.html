<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Enter Result</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow p-5">

		
		<div class="card-header bg-primary text-white">

									<div class="d-flex justify-content-between">

										<h2 class="mb-4">
										    Enter Student Result
										</h2>


									<a href="/teacher/dashboard"
									   class="btn btn-secondary">

									Back

									</a>

									</div>

						        </div>

		<form th:action="@{/teacher/save-result}"
		      method="post">

		    <label>Student</label>

		    <select
		        name="studentId"
		        class="form-control">

		        <option
		        th:each="student : ${students}"
		        th:value="${student.id}"
		        th:text="${student.firstName + ' ' + student.lastName}">
		        </option>

		    </select>

		    <br>

		    <label>Subject</label>

		    <select
		        name="subjectName"
		        class="form-control">

		        <option
		        th:each="subject : ${subjects}"
		        th:value="${subject.subjectName}"
		        th:text="${subject.subjectName}">
		        </option>

		    </select>

		    <br>

		    <label>Exam Name</label>

		    <select
		        name="examName"
		        class="form-control">

		        <option>Monthly Test</option>

		        <option>Mid Term</option>

		        <option>Final Term</option>

		    </select>

		    <br>

		    <label>Total Marks</label>

		    <input
		        type="number"
		        name="totalMarks"
		        value="100"
		        class="form-control">

		    <br>

		    <label>Obtained Marks</label>

		    <input
		        type="number"
		        name="obtainedMarks"
		        class="form-control">

		    <br>

		    <label>Remarks</label>

		    <textarea
		        name="remarks"
		        class="form-control">
		    </textarea>

		    <br>

		    <button
		        class="btn btn-success">

		        Save Result

		    </button>

		</form>

    </div>

</div>

</body>
</html>
