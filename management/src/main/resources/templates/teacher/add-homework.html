<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Add Homework</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3>Add Homework</h3>

</div>

<div class="card-body">

<form
th:action="@{/teacher/save-homework}"
method="post">

<label>Title</label>

<input
type="text"
name="title"
class="form-control"
required>

<br>

<label>Class</label>

<input
type="text"
name="className"
class="form-control"
required>

<br>

<label>Section</label>

<input
type="text"
name="section"
class="form-control"
required>

<br>

<label>Subject</label>

<input
type="text"
name="subject"
class="form-control">

<br>

<label>Description</label>

<textarea
name="description"
class="form-control">

</textarea>

<br>

<label>Due Date</label>

<input
type="date"
name="dueDate"
class="form-control">

<br>

<button
class="btn btn-success">

Save Homework

</button>

</form>

</div>

</div>

</div>

</body>

</html>
