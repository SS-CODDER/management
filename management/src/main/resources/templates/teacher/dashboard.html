<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Teacher Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/dashboard.css}">

</head>

<body>

<div class="sidebar">

    <div class="logo">
        Teacher Panel
    </div>

    <ul>

        <li><a href="#">Dashboard</a></li>
       <li><a href="/teacher/timetable">Timetable</a></li>
	   <li>
	   <a href="/teacher/classes">
	   My Classes
	   </a>
	   </li>

	   <li>
	   <a href="/teacher/homework">
	   Homework
	   </a>
	   </li>
        <li><a href="/teacher/result-form">Results</a></li>
		<li><a href="/teacher/attendance">Attendance</a></li>

    </ul>

</div>

<div class="main-content">

    <div class="topbar">

        <h2>Teacher Dashboard</h2>

        <button class="btn btn-success">
           <span th:text="${teacherName}"></span>
        </button>
		
		<a href="/"
				   class="btn btn-danger">

				   Logout

				</a>


    </div>

    <div class="row cards g-4">

        <div class="col-md-4">

            <div class="dashboard-card">

				<h2 th:text="${assignedClasses}">
				0
				</h2>

                <p>Classes Today</p>

            </div>

        </div>

        <div class="col-md-4">

            <div class="dashboard-card">

				<h2 th:text="${studentCount}">
				0
				</h2>

                <p>Total Students</p>

            </div>

        </div>

        <div class="col-md-4">

            <div class="dashboard-card">

				<h2 th:text="${homeworkCount}">
				0
				</h2>

				<p>Homework</p>

            </div>

        </div>

    </div>
	
	<div class="row">

	    <div class="col-md-4">

	        <div class="card shadow">

	            <div class="card-body text-center">

	                <h4>Attendance</h4>

	                <a href="/teacher/attendance"
	                   class="btn btn-primary">

	                    Open

	                </a>

	            </div>

	        </div>

	    </div>

	    <div class="col-md-4">

	        <div class="card shadow">

	            <div class="card-body text-center">

	                <h4>Results</h4>

	                <a href="/teacher/result-form"
	                   class="btn btn-success">

	                    Open

	                </a>

	            </div>

	        </div>

	    </div>

	    <div class="col-md-4">

	        <div class="card shadow">

	            <div class="card-body text-center">

	                <h4>Timetable</h4>

	                <a href="/teacher/timetable"
	                   class="btn btn-warning">

	                    Open

	                </a>

	            </div>

	        </div>

	    </div>

	</div>

</div>

</body>
</html>
