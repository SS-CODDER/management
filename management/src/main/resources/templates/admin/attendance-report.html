<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Attendance Report</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Attendance Report</h2>

<form
th:action="@{/admin/attendance-report}"
method="post">

<div class="row">

<div class="col-md-3">
<input
type="text"
name="className"
class="form-control"
placeholder="Class">
</div>

<div class="col-md-3">
<input
type="text"
name="section"
class="form-control"
placeholder="Section">
</div>

<div class="col-md-3">
<input
type="date"
name="date"
class="form-control">
</div>

<div class="col-md-3">
<button
class="btn btn-primary">

Search

</button>
</div>

</div>

</form>

<hr>

<table class="table table-bordered">

<thead>

<tr>

<th>Student</th>
<th>Class</th>
<th>Section</th>
<th>Status</th>

</tr>

</thead>

<tbody>

<tr th:each="a : ${report}">

<td th:text="${a.student.firstName}"></td>

<td th:text="${a.student.className}"></td>

<td th:text="${a.student.section}"></td>

<td th:text="${a.status}"></td>

</tr>

</tbody>

</table>
<a
th:href="@{'/admin/attendance-pdf?className='
+ ${param.className}
+ '&section='
+ ${param.section}
+ '&date='
+ ${param.date}}"

class="btn btn-danger">

Download PDF

</a>

</div>

</body>

</html>
