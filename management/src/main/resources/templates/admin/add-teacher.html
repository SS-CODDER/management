<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">

<title>Add Teacher</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">
                    <h3>Add Teacher</h3>
                </div>

                <div class="card-body">
					<div th:if="${error}"
					     class="alert alert-danger">

					    <span th:text="${error}"></span>

					</div>
                    <form th:action="@{/admin/save-teacher}"
                          th:object="${teacher}"
                          method="post">

                        <div class="mb-3">
                            <label class="form-label">Teacher Name</label>
                            <input type="text"
                                   th:field="*{teacherName}"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email"
                                   th:field="*{email}"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input type="text"
                                   th:field="*{phone}"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Subject</label>
                            <input type="text"
                                   th:field="*{subject}"
                                   class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Assigned Class</label>
                            <select th:field="*{assignedClass}"
                                    class="form-select">

                                <option value="6th">6th</option>
                                <option value="7th">7th</option>
                                <option value="8th">8th</option>
                                <option value="9th">9th</option>
                                <option value="10th">10th</option>
								<option value="11th">11th</option>
								<option value="12th">12th</option>

                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Assigned Section</label>

                            <select th:field="*{assignedSection}"
                                    class="form-select">

                                <option value="A">A</option>
                                <option value="B">B</option>
                                <option value="C">C</option>

                            </select>
                        </div>

                        <button class="btn btn-success">
                            Save Teacher
                        </button>

                        <a href="/admin/dashboard"
                           class="btn btn-secondary">
                            Back
                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
