<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Students Management</title>

    <link rel="stylesheet"
          th:href="@{/css/bootstrap.min.css}">

    <link rel="stylesheet"
          th:href="@{/css/dashboard.css}">

</head>

<body>

<div class="container-fluid mt-4">

    <!-- Header -->

    <div class="card shadow border-0 mb-4">

        <div class="card-body">

            <div class="d-flex justify-content-between align-items-center">

                <div>

                    <h2 class="fw-bold">
                        🎓 Students Management
                    </h2>

                    <p class="text-muted">
                        Manage all students from one place
                    </p>

                </div>

                <div>

                    <a href="/admin/dashboard"
                       class="btn btn-secondary">

                        ← Dashboard

                    </a>

                    <a href="/admin/add-student"
                       class="btn btn-primary">

                        + Add Student

                    </a>

                </div>

            </div>

        </div>

    </div>

    <!-- Search -->

    <div class="card shadow border-0 mb-4">

        <div class="card-body">

            <input type="text"
                   id="studentSearch"
                   class="form-control"
                   placeholder="Search Student...">

        </div>

    </div>

    <!-- Table -->

    <div class="card shadow border-0">

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-hover align-middle"
                       id="studentTable">

                    <thead class="table-dark">

                    <tr>

                        <th>ID</th>

                        <th>Student</th>

                        <th>Email</th>

                        <th>Class</th>

                        <th>Phone</th>

                        <th>Status</th>

                        <th>Actions</th>

                    </tr>

                    </thead>

                    <tbody>

                    <tr th:each="student : ${students}">

                        <td th:text="${student.id}"></td>

                        <td>

                            <div class="d-flex align-items-center">

                                <div class="me-3">

                                    <img src="/images/default-user.png"
                                         width="45"
                                         height="45"
                                         class="rounded-circle">

                                </div>

                                <div>

                                    <strong
                                            th:text="${student.firstName + ' ' + student.lastName}">
                                    </strong>

                                    <br>

                                    <small class="text-muted"
                                           th:text="${student.admissionNo}">
                                    </small>

                                </div>

                            </div>

                        </td>

                        <td th:text="${student.email}"></td>

                        <td>

                            <span class="badge bg-primary"
                                  th:text="${student.className}">
                            </span>

                        </td>

                        <td th:text="${student.phone}"></td>

                        <td>

                            <span class="badge bg-success">

                                Active

                            </span>

                        </td>

                        <td>

                            <a th:href="@{/admin/edit-student/{id}(id=${student.id})}"
                               class="btn btn-warning btn-sm">

                                Edit

                            </a>

                            <a th:href="@{/admin/delete-student/{id}(id=${student.id})}"
                               class="btn btn-danger btn-sm"

                               onclick="return confirm('Delete Student ?')">

                                Delete

                            </a>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script>

document
.getElementById("studentSearch")
.addEventListener("keyup", function(){

let value =
this.value.toLowerCase();

let rows =
document.querySelectorAll(
"#studentTable tbody tr"
);

rows.forEach(row=>{

row.style.display =
row.innerText.toLowerCase()
.includes(value)

? ""

: "none";

});

});

</script>

</body>

</html>
