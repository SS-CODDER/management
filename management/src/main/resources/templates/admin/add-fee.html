<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<title>Add Fee</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<div class="card shadow p-4">

<h2>Fee Submission</h2>

<div th:if="${success}"
     class="alert alert-success"
     th:text="${success}">
</div>

<div th:if="${error}"
     class="alert alert-danger"
     th:text="${error}">
</div>

<form th:action="@{/admin/save-fee}"
      method="post">

<div class="row">

<div class="col-md-6">

<label>Class</label>

<select id="className"
        class="form-control">

<option value="">Select</option>

<option th:each="c : ${classes}"
        th:value="${c.className}"
        th:text="${c.className}">
</option>

</select>

</div>

<div class="col-md-6">

<label>Section</label>

<select id="section"
        class="form-control">

<option value="">Select</option>

<option th:each="s : ${sections}"
        th:value="${s.sectionName}"
        th:text="${s.sectionName}">
</option>

</select>

</div>

</div>

<br>

<label>Student</label>

<select id="studentSelect"
        name="studentId"
        class="form-control"
        required>
</select>

<br>

<label>Month</label>

<select name="feeMonth"
        class="form-control"
        required>

<option>January</option>
<option>February</option>
<option>March</option>
<option>April</option>
<option>May</option>
<option>June</option>
<option>July</option>
<option>August</option>
<option>September</option>
<option>October</option>
<option>November</option>
<option>December</option>

</select>

<br>

<label>Year</label>

<input type="number"
       name="feeYear"
       class="form-control"
       th:value="${#dates.year(#dates.createNow())}"
       readonly>

<br>

<label>Total Fee</label>

<input type="number"
       name="totalFee"
       class="form-control"
       required>

<br>

<label>Paid Amount</label>

<input type="number"
       name="paidAmount"
       class="form-control"
       required>

<br>

<label>Payment Method</label>

<select name="paymentMethod"
        class="form-control">

<option>Cash</option>
<option>UPI</option>
<option>Online</option>

</select>

<br>

<label>Remarks</label>

<textarea name="remarks"
          class="form-control">
</textarea>

<br>

<button class="btn btn-success">
Submit Fee
</button>

</form>

</div>

</div>

<script>

document.getElementById("section")
.addEventListener("change", function() {

let className =
document.getElementById("className").value;

let section =
document.getElementById("section").value;

fetch("/admin/load-students?className="
+ className +
"&section=" +
section)

.then(response => response.json())

.then(data => {

let select =
document.getElementById("studentSelect");

select.innerHTML="";

data.forEach(student => {

select.innerHTML +=
`<option value="${student.id}">
${student.firstName}
${student.lastName}
(${student.admissionNo})
</option>`;

});

});

});

</script>

</body>
</html>
