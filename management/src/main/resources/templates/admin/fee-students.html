<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Students Fee</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-4">

<h2>

Students -
<span th:text="${className}"></span>

(
<span th:text="${section}"></span>
)

</h2>

<table class="table table-bordered">

<thead>

<tr>

<th>Admission</th>

<th>Name</th>

<th>Class</th>

<th>Section</th>

<th>Fee Status</th>

<th>Action</th>

</tr>

</thead>

<tbody>

<tr
th:each="student : ${students}">

<td th:text="${student.admissionNo}">
</td>

<td th:text="${student.firstName}">
</td>

<td th:text="${student.className}">
</td>

<td th:text="${student.section}">
</td>

<td>

<span
class="badge bg-danger">

Pending

</span>

</td>

<td>

<a
th:href="@{/admin/pay-fee/{id}(id=${student.id})}"
class="btn btn-success">

Pay Fee

</a>

</td>

</tr>

</tbody>

</table>

</div>

</body>

</html>
