<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Fee Management</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-5">
	
	<div class="d-flex justify-content-between">

	<h2>Fee Management</h2>

	<a href="/admin/dashboard"
	   class="btn btn-secondary">

	Back

	</a>

	</div>

<div class="card shadow">

<div class="card-header bg-success text-white">

<h3>Search Students</h3>

</div>

<div class="card-body">

<form
th:action="@{/admin/fees/students}"
method="get">

<div class="row">

<div class="col-md-5">

<label>Class</label>

<select
name="className"
class="form-control"
required>

<option value="">
Select Class
</option>

<option
th:each="c : ${classes}"
th:value="${c.className}"
th:text="${c.className}">
</option>

</select>

</div>

<div class="col-md-5">

<label>Section</label>

<select
name="section"
class="form-control"
required>

<option value="">
Select Section
</option>

<option
th:each="s : ${sections}"
th:value="${s.sectionName}"
th:text="${s.sectionName}">
</option>

</select>

</div>

<div class="col-md-2">

<label>&nbsp;</label>

<button
class="btn btn-success w-100">

Search

</button>

</div>

</div>

</form>

</div>

</div>

</div>

</body>

</html>
