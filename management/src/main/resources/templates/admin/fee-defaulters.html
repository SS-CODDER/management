<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Fee Defaulters</title>

<link rel="stylesheet"
      th:href="@{/css/bootstrap.min.css}">

<link rel="stylesheet"
      th:href="@{/css/dashboard.css}">

</head>

<body>

<div class="container-fluid p-4">

    <div class="card shadow border-0 mb-4">

        <div class="card-body d-flex
                    justify-content-between">

            <div>

                <h2>

                    🚨 Fee Defaulters

                </h2>

                <p class="text-muted">

                    Students with pending fees

                </p>

            </div>

            <a href="/admin/dashboard"
               class="btn btn-secondary">

                Dashboard

            </a>

        </div>

    </div>

    <div class="card shadow border-0">

        <div class="card-body">

            <table
            class="table table-hover">

                <thead
                class="table-dark">

                <tr>

                    <th>Admission</th>
                    <th>Name</th>
                    <th>Class</th>
                    <th>Month</th>
                    <th>Total</th>
                    <th>Paid</th>
                    <th>Due</th>

                </tr>

                </thead>

                <tbody>

                <tr
                th:each="f : ${defaulters}">

                    <td
                    th:text="${f.student.admissionNo}">
                    </td>

                    <td
                    th:text="${f.student.firstName}">
                    </td>

                    <td>

                        <span
                        th:text="${f.student.className}">
                        </span>

                        -

                        <span
                        th:text="${f.student.section}">
                        </span>

                    </td>

                    <td
                    th:text="${f.feeMonth}">
                    </td>

                    <td
                    th:text="${f.totalFee}">
                    </td>

                    <td
                    th:text="${f.paidAmount}">
                    </td>

                    <td>

                        <span
                        class="badge bg-danger"
                        th:text="${f.dueAmount}">
                        </span>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
