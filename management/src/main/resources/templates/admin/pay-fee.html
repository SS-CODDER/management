<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Pay Fee</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3>Student Fee Payment</h3>

</div>

<div class="card-body">

<div th:if="${success}"
     class="alert alert-success">

    <span th:text="${success}"></span>

</div>

<div th:if="${error}"
     class="alert alert-danger">

    <span th:text="${error}"></span>

</div>

<form th:action="@{/admin/save-fee}"
      method="post">

<input type="hidden"
       name="studentId"
       th:value="${student.id}">

<div class="row">

<div class="col-md-6 mb-3">

<label>Admission No</label>

<input type="text"
       class="form-control"
       th:value="${student.admissionNo}"
       readonly>

</div>

<div class="col-md-6 mb-3">

<label>Name</label>

<input type="text"
       class="form-control"
       th:value="${student.firstName}"
       readonly>

</div>

</div>

<div class="row">

<div class="col-md-4 mb-3">

<label>Class</label>

<input type="text"
       class="form-control"
       th:value="${student.className}"
       readonly>

</div>

<div class="col-md-4 mb-3">

<label>Section</label>

<input type="text"
       class="form-control"
       th:value="${student.section}"
       readonly>

</div>

<div class="col-md-4 mb-3">

<label>Month</label>

<input type="text"
       name="feeMonth"
       class="form-control"
       th:value="${fee.feeMonth}"
       readonly>

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label>Year</label>

<input type="number"
       name="feeYear"
       class="form-control"
       th:value="${fee.feeYear}"
       readonly>

</div>

<div class="col-md-6 mb-3">

<label>Total Fee</label>

<input type="number"
	   name="totalFee"
	   min="1"
       class="form-control"
       required>
	   


</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label>Paid Amount</label>

<input type="number"
       name="paidAmount"
	   min="0"
       class="form-control"
       required>

</div>

<div class="col-md-6 mb-3">

<label>Payment Method</label>

<select
name="paymentMethod"
class="form-control">

<option value="Cash">
Cash
</option>

<option value="Online">
Online
</option>

<option value="UPI">
UPI
</option>

</select>

</div>

</div>

<div class="mb-3">

<label>Remarks</label>

<textarea
name="remarks"
class="form-control">

</textarea>

<div class="alert alert-info">

Receipt will be generated automatically.

</div>

</div>

<button
class="btn btn-success">

Submit Fee

</button>

<a href="/admin/fees"
class="btn btn-secondary">

Back

</a>

</form>

</div>

</div>

</div>

</body>

</html>
