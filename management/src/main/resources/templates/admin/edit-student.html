<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Edit Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow p-5">

        <h2>Edit Student</h2>

        <form th:action="@{/admin/save-student}"
              th:object="${student}"
              method="post">

            <input type="hidden"
                   th:field="*{id}">

            <div class="mb-3">

                <label>Name</label>

                <input type="text"
                       th:field="*{name}"
                       class="form-control">

            </div>

            <div class="mb-3">

                <label>Email</label>

                <input type="email"
                       th:field="*{email}"
                       class="form-control">

            </div>

            <div class="mb-3">

                <label>Class</label>

                <input type="text"
                       th:field="*{studentClass}"
                       class="form-control">

            </div>

            <div class="mb-3">

                <label>Phone</label>

                <input type="text"
                       th:field="*{phone}"
                       class="form-control">

            </div>

            <button class="btn btn-primary">
                Update Student
            </button>

        </form>

    </div>

</div>

</body>
</html>
