<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Assign Teacher</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Assign Teacher</h2>

<form th:action="@{/admin/save-assignment}"
      method="post">

<label>Teacher</label>

<select name="teacherId" class="form-control">

    <option th:value="${teacher.id}"
            th:text="${teacher.teacherName}">
    </option>

</select>

<br>

<label>Class</label>

<select name="classId"
        class="form-control">

<option
th:each="c:${classes}"
th:value="${c.id}"
th:text="${c.className}">
</option>

</select>

<br>

<label>Section</label>

<select name="sectionId"
        class="form-control">

<option
th:each="s:${sections}"
th:value="${s.id}"
th:text="${s.sectionName}">
</option>

</select>

<br>

<label>Subject</label>

<select name="subjectId"
        class="form-control">

<option
th:each="sub:${subjects}"
th:value="${sub.id}"
th:text="${sub.subjectName}">
</option>

</select>

<br>

<button class="btn btn-success">

Assign Teacher

</button>

</form>

</div>

</body>
</html>
