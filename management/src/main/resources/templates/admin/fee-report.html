<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/dashboard.css}">

</head>

<body>

<!-- SIDEBAR -->

<div th:replace=
"fragments/sidebar :: sidebar">
</div>
<!-- MAIN -->

<div class="main-content">

    <!-- TOPBAR -->

	<div th:replace=
	"fragments/header :: header('Admin Dashboard')">
	</div>

    <!-- CARDS -->

	<form
	th:action="@{/admin/fee-report}"
	method="post">

	<label>Start Date</label>

	<input
	type="date"
	name="startDate">

	<label>End Date</label>

	<input
	type="date"
	name="endDate">

	<button
	class="btn btn-success">

	Search

	</button>

	</form>

	<hr>

	<table
	class="table table-bordered">

	<thead>

	<tr>

	<th>Student</th>

	<th>Month</th>

	<th>Paid</th>

	<th>Status</th>

	</tr>

	</thead>

	<tbody>

	<tr
	th:each="f : ${fees}">

	<td
	th:text="${f.student.firstName}">
	</td>

	<td
	th:text="${f.feeMonth}">
	</td>

	<td
	th:text="${f.paidAmount}">
	</td>

	<td
	th:text="${f.status}">
	</td>

	</tr>

	</tbody>

	</table>
</div>
<div th:replace=
	"fragments/footer :: footer">
	</div>

</body>
</html>
