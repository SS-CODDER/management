<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Create Timetable</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2>Create Timetable</h2>

        <form th:action="@{/admin/save-timetable}"
              method="post">

            <input type="text"
                   name="className"
                   class="form-control mb-3"
                   placeholder="Class">
				   <input type="text"
				                     name="section"
				                     class="form-control mb-3"
				                     placeholder="Section">

            <input type="text"
                   name="dayName"
                   class="form-control mb-3"
                   placeholder="Day">

            <input type="time"
                   name="startTime"
                   class="form-control mb-3">

            <input type="time"
                   name="endTime"
                   class="form-control mb-3">

            <input type="text"
                   name="subject"
                   class="form-control mb-3"
                   placeholder="Subject">

            <input type="text"
                   name="teacherName"
                   class="form-control mb-3"
                   placeholder="Teacher">

            <input type="text"
                   name="roomNo"
                   class="form-control mb-3"
                   placeholder="Room">

            <button class="btn btn-success">
                Save Timetable
            </button>

        </form>
		
		<a href="/admin/dashboard"
		     class="btn btn-primary">
		      Back To Dashboard
		  </a>

    </div>

</div>

</body>
</html>
