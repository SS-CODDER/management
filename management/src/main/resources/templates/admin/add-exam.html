<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Add Exam</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3>Schedule Exam</h3>

</div>

<div class="card-body">

<form th:action="@{/admin/save-exam}"
      method="post">

<label>Exam Name</label>

<input
type="text"
name="examName"
class="form-control"
required>

<br>

<label>Class</label>

<select
name="className"
class="form-control">

<option
th:each="c : ${classes}"
th:value="${c.className}"
th:text="${c.className}">
</option>

</select>

<br>

<label>Section</label>

<select
name="section"
class="form-control">

<option
th:each="s : ${sections}"
th:value="${s.sectionName}"
th:text="${s.sectionName}">
</option>

</select>

<br>

<label>Subject</label>

<select
name="subject"
class="form-control">

<option
th:each="s : ${subjects}"
th:value="${s.subjectName}"
th:text="${s.subjectName}">
</option>

</select>

<br>

<label>Exam Date</label>

<input
type="date"
name="examDate"
class="form-control"
required>

<br>

<label>Start Time</label>

<input
type="time"
name="startTime"
class="form-control">

<br>

<label>End Time</label>

<input
type="time"
name="endTime"
class="form-control">

<br>

<label>Room No</label>

<input
type="text"
name="roomNo"
class="form-control">

<br>

<button
class="btn btn-success">

Save Exam

</button>

</form>

</div>

</div>

</div>

</body>

</html>
