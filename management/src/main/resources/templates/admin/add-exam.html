<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Schedule Exam</title>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          th:href="@{/css/bootstrap.min.css}">

    <link rel="stylesheet"
          th:href="@{/css/dashboard.css}">

</head>

<body>

<div class="container-fluid py-4">

    <!-- Header -->

    <div class="card shadow border-0 mb-4">

        <div class="card-body d-flex
                    justify-content-between
                    align-items-center">

            <div>

                <h2 class="fw-bold">

                    📝 Schedule New Exam

                </h2>

                <p class="text-muted mb-0">

                    Create and manage examination schedules

                </p>

            </div>

            <a href="/admin/exams"
               class="btn btn-secondary">

                ← Back

            </a>

        </div>

    </div>

    <!-- Messages -->

    <div th:if="${success}"
         class="alert alert-success">

        <span th:text="${success}"></span>

    </div>

    <div th:if="${error}"
         class="alert alert-danger">

        <span th:text="${error}"></span>

    </div>

    <!-- Form -->

    <div class="card shadow border-0">

        <div class="card-body p-4">

            <form
            th:action="@{/admin/save-exam}"
            th:object="${exam}"
            method="post">

                <div class="row">

                    <!-- Exam Name -->

                    <div class="col-md-6 mb-3">

                        <label
                        class="form-label">

                            Exam Name

                        </label>

                        <input type="text"
                               th:field="*{examName}"
                               class="form-control"
                               placeholder="Mid Term Exam"
                               required>

                    </div>

                    <!-- Subject -->

                    <div class="col-md-6 mb-3">

                        <label
                        class="form-label">

                            Subject

                        </label>

                        <select
                        th:field="*{subject}"
                        class="form-select"
                        required>

                            <option value="">
                                Select Subject
                            </option>

                            <option
                            th:each="s : ${subjects}"
                            th:value="${s.subjectName}"
                            th:text="${s.subjectName}">
                            </option>

                        </select>

                    </div>

                    <!-- Class -->

                    <div class="col-md-6 mb-3">

                        <label
                        class="form-label">

                            Class

                        </label>

                        <select
                        th:field="*{className}"
                        class="form-select"
                        required>

                            <option value="">
                                Select Class
                            </option>

                            <option
                            th:each="c : ${classes}"
                            th:value="${c.className}"
                            th:text="${c.className}">
                            </option>

                        </select>

                    </div>

                    <!-- Section -->

                    <div class="col-md-6 mb-3">

                        <label
                        class="form-label">

                            Section

                        </label>

                        <select
                        th:field="*{section}"
                        class="form-select"
                        required>

                            <option value="">
                                Select Section
                            </option>

                            <option
                            th:each="s : ${sections}"
                            th:value="${s.sectionName}"
                            th:text="${s.sectionName}">
                            </option>

                        </select>

                    </div>

                    <!-- Date -->

                    <div class="col-md-4 mb-3">

                        <label
                        class="form-label">

                            Exam Date

                        </label>

                        <input type="date"
                               th:field="*{examDate}"
                               class="form-control"
                               required>

                    </div>

                    <!-- Start Time -->

                    <div class="col-md-4 mb-3">

                        <label
                        class="form-label">

                            Start Time

                        </label>

                        <input type="time"
                               th:field="*{startTime}"
                               class="form-control"
                               required>

                    </div>

                    <!-- End Time -->

                    <div class="col-md-4 mb-3">

                        <label
                        class="form-label">

                            End Time

                        </label>

                        <input type="time"
                               th:field="*{endTime}"
                               class="form-control"
                               required>

                    </div>

                    <!-- Room -->

                    <div class="col-md-4 mb-3">

                        <label
                        class="form-label">

                            Room Number

                        </label>

                        <input type="text"
                               th:field="*{roomNo}"
                               class="form-control">

                    </div>

                    <!-- Max Marks -->

                    <div class="col-md-4 mb-3">

                        <label
                        class="form-label">

                            Max Marks

                        </label>

                        <input type="number"
                               th:field="*{maxMarks}"
                               class="form-control"
                               required>

                    </div>

                    <!-- Pass Marks -->

                    <div class="col-md-4 mb-3">

                        <label
                        class="form-label">

                            Pass Marks

                        </label>

                        <input type="number"
                               th:field="*{passMarks}"
                               class="form-control"
                               required>

                    </div>

                    <!-- Year -->

                    <div class="col-md-4 mb-3">

                        <label
                        class="form-label">

                            Exam Year

                        </label>

                        <input type="number"
                               th:field="*{examYear}"
                               class="form-control"
                               value="2025">

                    </div>

                </div>

                <hr>

                <div class="text-end">

                    <button
                    type="submit"
                    class="btn btn-primary">

                        💾 Schedule Exam

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
