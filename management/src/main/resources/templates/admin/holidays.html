<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Holiday Calendar</title>

<link rel="stylesheet"
      th:href="@{/css/bootstrap.min.css}">

</head>

<body>

<div class="container mt-4">

<h2>📅 Holiday Calendar</h2>

<div class="card shadow">

<div class="card-body">

<table class="table table-hover">

<thead>

<tr>

<th>Name</th>
<th>Date</th>
<th>Description</th>

</tr>

</thead>

<tbody>

<tr th:each="h : ${holidays}">

<td th:text="${h.holidayName}"></td>

<td th:text="${h.holidayDate}"></td>

<td th:text="${h.description}"></td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</body>
</html>
