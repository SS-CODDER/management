<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Notice Board</title>

<link rel="stylesheet"
      th:href="@{/css/bootstrap.min.css}">

<link rel="stylesheet"
      th:href="@{/css/dashboard.css}">

</head>

<body>

<div class="container-fluid p-4">

    <div class="card shadow border-0 mb-4">

        <div class="card-body d-flex
                    justify-content-between">

            <div>

                <h2>📢 Notice Board</h2>

                <p class="text-muted">

                    School Notices Management

                </p>

            </div>

            <a href="/admin/add-notice"
               class="btn btn-primary">

                + Add Notice

            </a>

        </div>

    </div>

    <div class="card shadow border-0">

        <div class="card-body">

            <table
            class="table table-hover">

                <thead class="table-dark">

                <tr>

                    <th>Title</th>
                    <th>Type</th>
                    <th>Publish Date</th>
                    <th>Expiry Date</th>
                    <th>Status</th>
                    <th>Action</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="notice : ${notices}">

                    <td th:text="${notice.title}"></td>

                    <td>

                        <span
                        class="badge bg-info"
                        th:text="${notice.noticeType}">
                        </span>

                    </td>

                    <td th:text="${notice.publishDate}">
                    </td>

                    <td th:text="${notice.expiryDate}">
                    </td>

                    <td>

                        <span
                        class="badge bg-success">

                            Active

                        </span>

                    </td>

                    <td>

                        <a
                        th:href="@{/admin/delete-notice/{id}(id=${notice.id})}"
                        class="btn btn-danger btn-sm">

                            Delete

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
