<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Teachers</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-4">

    <div class="d-flex justify-content-between mb-3">

        <h2>Teachers Management</h2>

        <a href="/admin/add-teacher"
           class="btn btn-success">

            Add Teacher

        </a>
	
			<a href="/admin/dashboard"
					     class="btn btn-primary">
					      Back To Dashboard
					  </a>


    </div>

    <table class="table table-bordered table-striped table-hover shadow bg-white"
           th:if="${teachers != null && !teachers.isEmpty()}">

        <thead class="table-dark">

        <tr>

            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Subject</th>
            <th>Class</th>
            <th>Section</th>
            <th width="280">Actions</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="teacher : ${teachers}">

            <td th:text="${teacher.id}"></td>

            <td th:text="${teacher.teacherName}"></td>

            <td th:text="${teacher.email}"></td>

            <td th:text="${teacher.phone}"></td>

            <td th:text="${teacher.subject}"></td>

            <td th:text="${teacher.assignedClass}"></td>

            <td th:text="${teacher.assignedSection}"></td>

            <td>

                <a th:href="@{/admin/assign-teacher/{id}(id=${teacher.id})}"
                   class="btn btn-warning btn-sm">

                    Assign

                </a>

                <a th:href="@{/admin/edit-teacher/{id}(id=${teacher.id})}"
                   class="btn btn-primary btn-sm">

                    Edit

                </a>

                <a th:href="@{/admin/delete-teacher/{id}(id=${teacher.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Delete Teacher?')">

                    Delete

                </a>

            </td>

        </tr>

        </tbody>

    </table>
	<tr th:if="${#lists.isEmpty(teachers)}">
	    <td colspan="7" class="text-center text-danger">
	        No Teacher Found
	    </td>
	</tr>

</div>

</body>
</html>
