<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Teachers Management</title>

    <link rel="stylesheet"
          th:href="@{/css/bootstrap.min.css}">

    <link rel="stylesheet"
          th:href="@{/css/dashboard.css}">

</head>

<body>

<div class="container-fluid mt-4">

    <!-- Header -->

    <div class="card shadow border-0 mb-4">

        <div class="card-body">

            <div class="d-flex justify-content-between align-items-center">

                <div>

                    <h2 class="fw-bold">
                        👨‍🏫 Teachers Management
                    </h2>

                    <p class="text-muted">
                        Manage all teachers from one place
                    </p>

                </div>

                <div>

                    <a href="/admin/dashboard"
                       class="btn btn-secondary">

                        ← Dashboard

                    </a>

                    <a href="/admin/add-teacher"
                       class="btn btn-success">

                        + Add Teacher

                    </a>

                </div>

            </div>

        </div>

    </div>

    <!-- Search -->

    <div class="card shadow border-0 mb-4">

        <div class="card-body">

            <input type="text"
                   id="teacherSearch"
                   class="form-control"
                   placeholder="Search Teacher...">

        </div>

    </div>

    <!-- Table -->

    <div class="card shadow border-0">

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-hover align-middle"
                       id="teacherTable">

                    <thead class="table-dark">

                    <tr>

                        <th>ID</th>
                        <th>Teacher</th>
                        <th>Subject</th>
                        <th>Phone</th>
                        <th>Email</th>
                        <th>Class</th>
                        <th>Status</th>
                        <th>Actions</th>

                    </tr>

                    </thead>

                    <tbody>

                    <tr th:each="teacher : ${teachers}">

                        <td th:text="${teacher.id}"></td>

                        <td>

                            <div class="d-flex align-items-center">

                                <div class="me-3">

                                    <img src="/images/default-user.png"
                                         width="45"
                                         height="45"
                                         class="rounded-circle">

                                </div>

                                <div>

                                    <strong
                                      th:text="${teacher.teacherName}">
                                    </strong>

                                    <br>

                                    <small class="text-muted"
                                           th:text="${teacher.qualification}">
                                    </small>

                                </div>

                            </div>

                        </td>

                        <td>

                            <span class="badge bg-info"
                                  th:text="${teacher.subject}">
                            </span>

                        </td>

                        <td th:text="${teacher.phone}"></td>

                        <td th:text="${teacher.email}"></td>

                        <td>

                            <span class="badge bg-primary">

                                <span th:text="${teacher.assignedClass}"></span>
                                -
                                <span th:text="${teacher.assignedSection}"></span>

                            </span>

                        </td>

                        <td>

                            <span class="badge bg-success">
                                Active
                            </span>

                        </td>

                        <td>

                            <a th:href="@{/admin/assign-teacher/{id}(id=${teacher.id})}"
                               class="btn btn-warning btn-sm">

                                Assign

                            </a>

                            <a th:href="@{/admin/edit-teacher/{id}(id=${teacher.id})}"
                               class="btn btn-primary btn-sm">

                                Edit

                            </a>

                            <a th:href="@{/admin/delete-teacher/{id}(id=${teacher.id})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Delete Teacher?')">

                                Delete

                            </a>

                        </td>

                    </tr>

                    </tbody>

                </table>

                <div th:if="${#lists.isEmpty(teachers)}"
                     class="text-center text-danger p-4">

                    No Teacher Found

                </div>

            </div>

        </div>

    </div>

</div>

<script>

document
.getElementById("teacherSearch")
.addEventListener("keyup", function(){

let value =
this.value.toLowerCase();

let rows =
document.querySelectorAll(
"#teacherTable tbody tr"
);

rows.forEach(row=>{

row.style.display =
row.innerText.toLowerCase()
.includes(value)

? ""

: "none";

});

});

</script>

</body>

</html>
