<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Add Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow p-5">

        <h2 class="mb-4">
            Add Student
        </h2>
		<div th:if="${error}"
		     class="alert alert-danger">

		    <span th:text="${error}"></span>

		</div>
        <form th:action="@{/admin/save-student}"
              th:object="${student}"
              method="post">
			  
			  <div class="mb-3">

			  				<label>Admission No</label>
			  				<input type="text"
			  				       th:field="*{admissionNo}"
			  				       class="form-control">

			              </div>

            <div class="mb-3">

				<label>First Name</label>
				<input type="text"
				       th:field="*{firstName}"
				       class="form-control">

            </div>
			
			<div class="mb-3">
			    <label>Last Name</label>

			    <input type="text"
			           th:field="*{lastName}"
			           class="form-control">
			</div>

            <div class="mb-3">

                <label>Email</label>

                <input type="email"
                       th:field="*{email}"
                       class="form-control">

            </div>

            <div class="mb-3">

				<label>Class</label>

				<input type="text"
				       th:field="*{className}"
				       class="form-control">

            </div>

            <div class="mb-3">

                <label>Phone</label>

                <input type="text"
                       th:field="*{phone}"
                       class="form-control">

            </div>
			
			<div class="mb-3">

			               <label>Address</label>

			               <input type="text"
			                      th:field="*{address}"
			                      class="form-control">

			           </div>
					   
					   
<!--					   <div class="mb-3">-->

<!--					                  <label>className</label>-->

<!--					                  <input type="text"-->
<!--					                         th:field="*{className}"-->
<!--					                         class="form-control">-->

<!--					              </div>-->
								  
								  <div class="mb-3">

								  				                  <label>section</label>

								  				                  <input type="text"
								  				                         th:field="*{section}"
								  				                         class="form-control">

								  				              </div>

            <button class="btn btn-success">
                Save Student
            </button>

        </form>
		<a href="/admin/dashboard"
		     class="btn btn-primary">
		      Back To Dashboard
		  </a>
    </div>

</div>

</body>
</html>
